version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: kejaflix
      POSTGRES_PASSWORD: kejaflix
      POSTGRES_DB: kejaflix
    ports:
      - "5432:5432"
    volumes:
      - kejaflix_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kejaflix"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://kejaflix:kejaflix@db:5432/kejaflix
      MEDIA_ROOT: /app/static
    ports:
      - "8000:8000"
    volumes:
      - ./static:/app/static
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  kejaflix_db_data:
